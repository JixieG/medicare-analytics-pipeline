version: 2

models:
  - name: medicare_raw
    description: "Raw Medicare physician and practitioner data - 100k rows"
    columns:
      - name: '"Rndrng_NPI"'
        description: "Unique provider identifier"
        data_tests:
          - not_null

  - name: specialty_payments
    description: "Medicare payments aggregated by medical specialty"
    columns:
      - name: specialty
        description: "Medical specialty type"
        data_tests:
          - not_null
          - unique
      - name: avg_medicare_payment
        description: "Average Medicare payment amount"
        data_tests:
          - not_null

  - name: state_payments
    description: "Medicare payments aggregated by state"
    columns:
      - name: state
        description: "US state abbreviation"
        data_tests:
          - not_null
          - unique
      - name: total_medicare_payment
        description: "Total Medicare payment amount"
        data_tests:
          - not_null
